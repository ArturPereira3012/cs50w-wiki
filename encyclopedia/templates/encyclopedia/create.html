{% extends "encyclopedia/layout.html" %}

{% block title %}Create New Page{% endblock %}

{% block body %}
  <h2>Create New Entry</h2>
  <form action="{% url 'create' %}" method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Title:</label>
      <input type="text" class="form-control" name="title" required placeholder="Entry title">
    </div>
    <div class="form-group">
      <label>Content (Markdown):</label>
      <textarea class="form-control" name="content" rows="10" required placeholder="Write content in Markdown..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
{% endblock %}
